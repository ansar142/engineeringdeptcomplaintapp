<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register Complaint</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        form { background: #f4f4f4; padding: 20px; border-radius: 8px; max-width: 600px; margin: auto; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        button { background-color: #4CAF50; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; margin-top: 20px; }
        h2 { text-align: center; }
    </style>
</head>
<body>

<h2>Register a New Complaint</h2>

<form th:action="@{/complaints/register}" th:object="${complaint}" method="post">

    <label for="department">Department:</label>
    <select id="department" th:field="*{department}">
        <option th:each="dept : ${departments}" th:value="${dept.id}" th:text="${dept.name}"></option>
    </select>

    <label for="title">Complaint Title:</label>
    <input type="text" id="title" th:field="*{title}" required />

    <label for="description">Description:</label>
    <textarea id="description" th:field="*{description}" rows="5" required></textarea>

    <label for="type">Complaint Type:</label>
    <select id="type" th:field="*{type}">
        <option th:each="type : ${T(com.UOK.engineeringDeptComplaintApp.model.ComplaintType).values()}"
                th:value="${type}" th:text="${type}"></option>
    </select>

    <button type="submit">Submit Complaint</button>
</form>

</body>
</html>
