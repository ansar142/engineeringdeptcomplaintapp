<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Department Complaints</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f4; /* Added a light background for better visual separation */
        }

        h2 {
            color: #333;
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); /* Added subtle shadow for depth */
            background-color: #fff;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #007bff; /* Changed header background color */
            color: white; /* Changed header text color */
            font-weight: bold;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tr:hover {
            background-color: #e9ecef; /* Added hover effect for rows */
        }

        a {
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
            color: #0056b3;
        }

        p {
            color: #555;
        }
    </style>
</head>
<body>

<h2>Department Complaints</h2>

<p th:if="${complaints.isEmpty()}">No complaints have been registered for this department.</p>

<table th:if="${!complaints.isEmpty()}">
    <thead>
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Status</th>
        <th>Registered On</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="complaint : ${complaints}">
        <td th:text="${complaint.id}">1</td>
        <td th:text="${complaint.title}">Faulty Lab Equipment</td>
        <td th:text="${complaint.status}">REGISTERED</td>
        <td th:text="${#temporals.format(complaint.dateRegistered, 'yyyy-MM-dd HH:mm')}"></td>
        <td>
            <a th:href="@{/complaints/department/detail/{id}(id=${complaint.id})}">View Details</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
