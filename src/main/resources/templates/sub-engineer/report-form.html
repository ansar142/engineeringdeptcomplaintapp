<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Submit Inspection Report</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        form { background: #f4f4f4; padding: 20px; border-radius: 8px; max-width: 600px; margin: auto; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, textarea { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        button { background-color: #4CAF50; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<h2>Submit Inspection Report</h2>
<p>Please provide details and an image of your findings.</p>

<form th:action="@{/sub-engineer/submit-report}" method="post">
    <input type="hidden" name="complaintId" th:value="${complaintId}" />

    <label for="reportDetails">Inspection Details:</label>
    <textarea id="reportDetails" name="reportDetails" rows="8" required></textarea>

    <label for="imagePath">Image URL:</label>
    <input type="text" id="imagePath" name="imagePath" placeholder="e.g., /images/report-123.jpg" required />

    <button type="submit">Submit Report</button>
</form>

</body>
</html>
