<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Report Submitted Successfully</title>

    <style>
        /* Basic Tailwind-like styling for a modern, responsive card layout */
        body { font-family: 'Inter', Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f4; }
        .container {
            background-color: #e8f5e9; /* Light Green */
            border: 1px solid #c8e6c9;
            padding: 40px 20px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 90%;
            margin: auto;
        }
        h2 {
            color: #2e7d32; /* Dark Green */
            margin-bottom: 15px;
            font-weight: 700;
            font-size: 1.8rem;
        }
        p {
            color: #388e3c; /* Medium Green */
            font-size: 1.05em;
            margin-bottom: 5px;
        }
        .error-message {
            color: #d32f2f; /* Red */
            font-weight: 600;
            margin-top: 20px;
            background-color: #ffebee;
            padding: 10px;
            border-radius: 8px;
        }
        #redirectMessage {
            margin-top: 20px;
            color: #616161;
            font-style: italic;
        }

    </style>

    <!--
        REDIRECT LOGIC: Uses HTML's meta refresh, which is configured
        dynamically by Thymeleaf (th:attr) to include the correct ID.
        This is a non-JavaScript solution to the original SpEL parsing error.
    -->
    <th:block th:if="${subEngineerId}">
        <!-- Redirects in 3 seconds to the complaints page using the dynamically resolved ID -->
        <meta http-equiv="refresh" th:attr="content='3;url=/sub-engineer/' + ${subEngineerId} + '/complaints'" />
    </th:block>

</head>
<body>
<div class="container">
    <h2>Report Submitted Successfully!</h2>
    <p>Thank you for submitting the report. The complaint status has been updated.</p>

    <!-- Conditional message display -->
    <div th:if="${subEngineerId}">
        <p id="redirectMessage">
            Redirecting you to the complaints page in 3 seconds.
        </p>
    </div>
    <div th:unless="${subEngineerId}">
        <p class="error-message">
            Error: Sub Engineer ID is missing. Cannot redirect automatically. Please navigate using the back button.
        </p>
    </div>

</div>
</body>
</html>
