<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - UOK Complaint App</title>
    <!-- Simple, clean CSS for the login form -->
    <style>
        body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f9;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        }
        .login-container {
        background-color: #ffffff;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 400px;
        text-align: center;
        }
        h2 {
        color: #004d99; /* University Blue /
        margin-bottom: 25px;
        }
        .form-group {
        margin-bottom: 20px;
        text-align: left;
        }
        .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
        color: #333;
        }
        .form-group input[type="text"],
        .form-group input[type="password"] {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 5px;
        box-sizing: border-box; / Include padding in element's total width */
        transition: border-color 0.3s;
        }
        .form-group input:focus {
        border-color: #0066cc;
        outline: none;
        }
        .btn-primary {
        width: 100%;
        padding: 12px;
        background-color: #004d99;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        transition: background-color 0.3s;
        }
        .btn-primary:hover {
        background-color: #003366;
        }
        .alert {
        padding: 10px;
        margin-bottom: 15px;
        border-radius: 5px;
        font-size: 14px;
        }
        .alert-error {
        background-color: #fddddd;
        color: #cc0000;
        border: 1px solid #cc0000;
        }
        .alert-logout {
        background-color: #ddfdd9;
        color: #1a7900;
        border: 1px solid #1a7900;
        }
        .field-error {
        color: #cc0000;
        font-size: 12px;
        margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Admin Portal Login</h2>

    <!-- Authentication Error Message (Handled by Spring Security) -->
    <div th:if="${param.error}" class="alert alert-error">
        Invalid Username or Password. Please try again.
    </div>

    <!-- Logout Success Message -->
    <div th:if="${param.logout}" class="alert alert-logout">
        You have been successfully logged out.
    </div>

    <!-- The login form. Spring Security expects POST to the login processing URL,
         which defaults to /login unless explicitly configured, but we let it default
         since we specified the success/failure handlers in SecurityConfig. -->
    <form th:action="@{/login}" method="post" th:object="${adminLoginDto}">

        <!-- Username Input -->
        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
            <!-- Field Validation Error (from AdminLoginDto) -->
            <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="field-error"></p>
        </div>

        <!-- Password Input -->
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            <!-- Field Validation Error (from AdminLoginDto) -->
            <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="field-error"></p>
        </div>

        <div class="form-group">
            <button type="submit" class="btn-primary">Log In</button>
        </div>

    </form>

</div>

</body>
</html>
