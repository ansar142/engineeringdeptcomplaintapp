<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Complaint Submitted</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        .container { background-color: #e8f5e9; border: 1px solid #c8e6c9; padding: 20px; border-radius: 8px; display: inline-block; }
        h2 { color: #2e7d32; }
    </style>
</head>
<body>

<div class="container">
    <h2>Your complaint has been registered.</h2>
    <p>Redirecting you to the registration page in 3 seconds...</p>
</div>
<script>
    setTimeout(function() {
        window.location.href = "/complaints/register";
    }, 3000); // 3000 milliseconds = 3 seconds
</script>

</body>
</html>
