<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Chief Engineer Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f2f2f2; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        a { text-decoration: none; color: #007bff; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<h2>Chief Engineer Dashboard: All Complaints</h2>

<p th:if="${complaints.isEmpty()}">No complaints have been registered yet.</p>

<table th:if="${!complaints.isEmpty()}">
    <thead>
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Department</th>
        <th>Status</th>
        <th>Registered On</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="complaint : ${complaints}">
        <td th:text="${complaint.id}">1</td>
        <td th:text="${complaint.title}">Faulty Lab Equipment</td>
        <td>
            <span th:if="${complaint.department != null}" th:text="${complaint.department.name}">Electrical Engineering</span>
            <span th:if="${complaint.department == null}">N/A</span>
        </td>
        <td th:text="${complaint.status}">REGISTERED</td>
        <td th:text="${#temporals.format(complaint.dateRegistered, 'yyyy-MM-dd HH:mm')}">2025-09-21 03:00</td>
        <td>
            <a th:href="@{/complaints/chief/{id}(id=${complaint.id})}">View Details</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
