spring.application.name=engineeringDeptComplaintApp
# PostgreSQL database connection settings
spring.datasource.url=jdbc:postgresql://localhost:5432/db_engDept_complaint
spring.datasource.username=postgres
spring.datasource.password=0000
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA and Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Set the maximum file size for a single file upload
spring.servlet.multipart.max-file-size=5MB

# Set the maximum request size, which includes all parts of the multipart request (file + form data)
spring.servlet.multipart.max-request-size=5MB