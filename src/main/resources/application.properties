spring.application.name=engineeringDeptComplaintApp

# PostgreSQL database connection settings - USE 5432 (internal Docker network port)
#spring.datasource.url=jdbc:postgresql://15.53.238.122/db@engDeptUOK_complaint
#spring.datasource.username=xyz
#spring.datasource.password=-----
#spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/test
spring.datasource.username=postgres
spring.datasource.password=0000
# Define a path where files will be saved. Choose an absolute path relevant to your OS.
# For Windows:
file.upload-dir=C:/UOK_Complaint_Uploads
# For Linux/Mac:
#file.upload-dir=/opt/uok_complaint_uploads

# Connection pool settings with retry
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# JPA and Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Important: Wait for database to be ready
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.datasource.hikari.initialization-fail-timeout=0

app.init-default-data=true

# Set the maximum file size for a single file upload
spring.servlet.multipart.max-file-size=5MB

# Set the maximum request size
spring.servlet.multipart.max-request-size=6MB

# For PostgreSQL, this helps with sequence management
spring.jpa.properties.hibernate.id.optimizer.pooled.preferred=pooled-lo
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
