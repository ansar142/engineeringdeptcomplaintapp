version: "3.8"

services:
  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/db_engDept_complaint
      - SPRING_DATASOURCE_USERNAME=Saad
      - SPRING_DATASOURCE_PASSWORD=1234
    networks:
      - new-network
    restart: on-failure

  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: Saad
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: db_engDept_complaint
    ports:
      - "5433:5432"  # External:5433 -> Internal:5432
    volumes:
      # Named volume (recommended for production)
      - postgres_data:/var/lib/postgresql/data

      # Alternative: Bind mount (easier to access from host)
      # - ./postgres-data:/var/lib/postgresql/data
    networks:
      - new-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U Saad -d db_engDept_complaint"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  new-network:
    driver: bridge

volumes:
  postgres_data:
  # Optional: Use a specific driver
  # driver: local